<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtendeMais - Prefeitura de Itabirinha</title>
  
  <!-- Fontes (DM Sans e DM Mono) -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Bibliotecas React e Babel (Standalone para rodar no navegador) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Arquitetura CSS (OOCSS + BEM) -->
  <style>
    :root {
      /* Paleta Soft Dark */
      --bg-base: #0B141E; 
      --bg-surface: #121F2F; 
      --bg-elevated: #1A2A40; 
      --border-subtle: #23354E;
      
      /* Cores de Marca / Feedback */
      --brand-blue: #3B82F6; 
      --brand-green: #10B981; 
      --brand-red: #EF4444; 
      --brand-gold: #F59E0B;
      
      /* Fundos com Opacidade (Para Badges e Hovers) */
      --bg-blue-soft: rgba(59, 130, 246, 0.15); 
      --bg-green-soft: rgba(16, 185, 129, 0.15);
      --bg-red-soft: rgba(239, 68, 68, 0.15); 
      --bg-gold-soft: rgba(245, 158, 11, 0.15);
      
      /* Tipografia */
      --text-primary: #F8FAFC; 
      --text-muted: #94A3B8; 
      --text-faint: #475569;
    }
    
    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; background: var(--bg-base); color: var(--text-primary); font-family: 'DM Sans', sans-serif; }
    #root { height: 100%; display: flex; flex-direction: column; }
    
    /* Utilitários de Layout (OOCSS) */
    .flex { display: flex; } 
    .flex-col { display: flex; flex-direction: column; }
    .items-center { align-items: center; } 
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } 
    .p-4 { padding: 16px; } .p-5 { padding: 20px; }
    .w-full { width: 100%; } .flex-1 { flex: 1; }
    .text-center { text-align: center; }
    .text-mono { font-family: 'DM Mono', monospace; } 
    .text-muted { color: var(--text-muted); }
    .mt-4 { margin-top: 16px; } .mb-4 { margin-bottom: 16px; }
    
    /* Tipografia (OOCSS) */
    .h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
    .h3 { font-size: 1.25rem; font-weight: 700; }
    .h6 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
    
    /* Botões (BEM) */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn--sm { padding: 6px 14px; font-size: 0.8rem; }
    .btn--md { padding: 10px 20px; font-size: 0.9rem; }
    .btn--lg { padding: 14px 28px; font-size: 1rem; }
    
    .btn--primary { background: var(--brand-blue); color: #fff; } 
    .btn--primary:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 4px 12px var(--bg-blue-soft); }
    
    .btn--success { background: var(--bg-green-soft); color: var(--brand-green); border: 1px solid rgba(16, 185, 129, 0.3); } 
    .btn--success:hover:not(:disabled) { background: var(--brand-green); color: #fff; }
    
    .btn--danger { background: var(--bg-red-soft); color: var(--brand-red); border: 1px solid rgba(239, 68, 68, 0.3); } 
    .btn--danger:hover:not(:disabled) { background: var(--brand-red); color: #fff; }
    
    .btn--ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border-subtle); } 
    .btn--ghost:hover:not(:disabled) { background: var(--bg-elevated); color: var(--text-primary); }
    
    /* Badges (BEM) */
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .badge--blue { background: var(--bg-blue-soft); color: var(--brand-blue); border: 1px solid rgba(59, 130, 246, 0.2); }
    .badge--amber { background: var(--bg-gold-soft); color: var(--brand-gold); border: 1px solid rgba(245, 158, 11, 0.2); }
    .badge--gray { background: var(--bg-surface); color: var(--text-muted); border: 1px solid var(--border-subtle); }
    
    /* Cards (BEM) */
    .card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 16px; transition: all 0.2s; }
    .card--active { background: linear-gradient(135deg, var(--bg-surface), var(--bg-green-soft)); border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 0 20px var(--bg-green-soft); }
    .card--interactive:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); border-color: var(--brand-blue); cursor: pointer; }
    
    /* Forms (OOCSS) */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
    .form-control { background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 10px 14px; color: var(--text-primary); font-size: 0.9rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
    .form-control:focus { border-color: var(--brand-blue); }
    
    /* Status Orb */
    .orb-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .orb { position: relative; border-radius: 50%; }
    .orb--sm { width: 16px; height: 16px; } .orb--lg { width: 80px; height: 80px; }
    .orb--online { background: var(--brand-green); box-shadow: 0 0 16px var(--brand-green); }
    .orb--busy { background: var(--brand-red); box-shadow: 0 0 16px var(--brand-red); }
    .orb--pulse::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: inherit; opacity: 0.4; animation: pulse 2s ease-out infinite; }
    
    /* Modals & Alerts */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-content { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 16px; width: 100%; max-width: 420px; padding: 24px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
    
    .alert { position: fixed; top: 20px; right: 20px; display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 12px; background: var(--bg-elevated); box-shadow: 0 12px 32px rgba(0,0,0,0.5); z-index: 999; border-left: 4px solid transparent; animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .alert--success { border-left-color: var(--brand-green); } 
    .alert--info { border-left-color: var(--brand-blue); }
    .alert--warning { border-left-color: var(--brand-gold); }
    
    /* Animations */
    @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .animate-blink { animation: blink 2s infinite; }

    /* Layout Principal App */
    .app-container { max-width: 800px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 100%; }
    header { background: var(--bg-surface); border-bottom: 1px solid var(--border-subtle); }
    main { overflow-y: auto; flex: 1; padding: 24px 20px; }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Script React -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── UTILS & ICONS ────────────────────────────────────────────────────────
    const uid = () => Math.random().toString(36).slice(2, 8);
    const formatDur = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

    const Icon = ({ name }) => {
      const i = {
        plus: <path d="M12 5v14M5 12h14" />, 
        check: <path d="M5 12l5 5L20 7" />,
        logout: <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />,
        trash: <path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2" />,
        radio: <><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49M7.76 16.24a6 6 0 0 1 0-8.49M19.07 4.93a10 10 0 0 1 0 14.14M4.93 19.07a10 10 0 0 1 0-14.14" /></>,
        users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
      };
      return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{i[name]}</svg>;
    };

    // ─── UI COMPONENTS ────────────────────────────────────────────────────────
    const StatusOrb = ({ online, large, onClick }) => (
      <div className="orb-wrapper" onClick={onClick} style={{ cursor: onClick ? 'pointer' : 'default' }}>
        <div className={`orb ${large ? "orb--lg" : "orb--sm"} ${online ? "orb--online orb--pulse" : "orb--busy"}`} />
        <span className="text-mono" style={{ fontSize: large ? 13 : 10, color: online ? "var(--brand-green)" : "var(--brand-red)", fontWeight: 700 }}>
          {online ? "LIVRE" : "OCUPADO"}
        </span>
      </div>
    );

    const Timer = ({ start }) => {
      const [sec, setSec] = useState(0);
      useEffect(() => { 
        const interval = setInterval(() => setSec(Math.floor((Date.now()-start)/1000)), 1000); 
        return () => clearInterval(interval); 
      }, [start]);
      
      return (
        <div className="text-mono animate-blink" style={{ color: "var(--brand-green)", background: "var(--bg-green-soft)", padding: "4px 8px", borderRadius: "6px", fontSize: "0.85rem" }}>
          {formatDur(sec)}
        </div>
      );
    };

    const Toast = ({ msg, type, close }) => {
      useEffect(() => { const t = setTimeout(close, 4000); return () => clearTimeout(t); }, []);
      return (
        <div className={`alert alert--${type}`}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: type === 'success' ? 'var(--brand-green)' : 'var(--brand-blue)' }} />
          <div className="flex-1" style={{ fontSize: "0.9rem", fontWeight: 500 }}>{msg}</div>
        </div>
      );
    };

    const CitizenCard = ({ person, isCurrent, role, onCall, onRemove, onFinish }) => (
      <div className={`card ${isCurrent ? "card--active" : ""} flex items-center justify-between gap-4 mb-4`}>
        <div className="flex-1" style={{ minWidth: 0 }}>
          <div className="text-truncate" style={{ fontWeight: 600, fontSize: "1.05rem", color: isCurrent ? "#fff" : "var(--text-primary)" }}>
            {person.name}
          </div>
          <div className="flex items-center gap-2 mt-4" style={{ marginTop: '6px' }}>
            <span className="badge badge--blue">{person.subject}</span>
            {person.tags.map(t => <span key={t} className="badge badge--amber">{t}</span>)}
            {person.status === "done" && <span className="badge badge--gray">Concluído</span>}
          </div>
        </div>
        
        <div className="flex gap-2 items-center">
          {person.status === "in-progress" && <Timer start={person.startedAt} />}
          
          {role === "receptionist" && person.status === "waiting" && (
            <>
              <button className="btn btn--ghost btn--sm" onClick={() => onRemove(person.id)} title="Remover"><Icon name="trash" /></button>
              <button className="btn btn--success btn--sm" onClick={() => onCall(person.id)}>Chamar</button>
            </>
          )}
          
          {role === "mayor" && person.status === "in-progress" && (
            <button className="btn btn--success btn--sm" onClick={() => onFinish(person.id)}><Icon name="check"/> Encerrar</button>
          )}
        </div>
      </div>
    );

    const AddModal = ({ onAdd, onClose }) => {
      const [name, setName] = useState("");
      const [subj, setSubj] = useState("Saúde");
      const [tag, setTag] = useState("");
      
      const handleSubmit = () => {
        if (!name.trim()) return;
        onAdd({ 
          id: uid(), 
          name: name.trim(), 
          subject: subj, 
          tags: tag ? [tag] : [], 
          status: "waiting" 
        });
      };

      return (
        <div className="modal-overlay">
          <div className="modal-content">
            <h3 className="h3 mb-4">Registrar Cidadão</h3>
            <div className="form-group">
              <label className="form-label">Nome Completo</label>
              <input className="form-control" autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="Ex: Maria Aparecida" />
            </div>
            <div className="form-group">
              <label className="form-label">Assunto Principal</label>
              <select className="form-control" value={subj} onChange={e=>setSubj(e.target.value)}>
                {["Saúde", "Infraestrutura", "Educação", "Assistência Social", "Gabinete"].map(o => <option key={o}>{o}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Marcação Especial (Opcional)</label>
              <select className="form-control" value={tag} onChange={e=>setTag(e.target.value)}>
                <option value="">Nenhuma</option>
                <option value="Urgente">Urgente</option>
                <option value="Prioridade Lei">Prioridade Por Lei</option>
                <option value="Recorrente">Recorrente</option>
              </select>
            </div>
            <div className="flex justify-between mt-4" style={{ marginTop: "24px" }}>
              <button className="btn btn--ghost" onClick={onClose}>Cancelar</button>
              <button className="btn btn--primary" disabled={!name.trim()} onClick={handleSubmit}>Adicionar à Fila</button>
            </div>
          </div>
        </div>
      );
    };

    // ─── SCREENS ──────────────────────────────────────────────────────────────
    const LoginScreen = ({ setRole }) => (
      <div className="flex-col items-center justify-center w-full" style={{ height: "100vh", padding: "20px" }}>
        <div className="text-center mb-4" style={{ marginBottom: "40px" }}>
          <div style={{ width: 64, height: 64, margin: "0 auto 16px", borderRadius: 16, background: "var(--bg-blue-soft)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--brand-blue)" }}>
            <Icon name="radio" />
          </div>
          <h1 className="h1" style={{ color: "var(--brand-blue)" }}>AtendeMais</h1>
          <p className="text-muted mt-4">Prefeitura de Itabirinha · MG</p>
        </div>
        
        <div className="flex gap-4 w-full" style={{ maxWidth: "400px" }}>
          <button className="card card--interactive flex-col items-center justify-center flex-1 p-5" onClick={() => setRole("receptionist")}>
            <div style={{ color: "var(--brand-blue)", marginBottom: 12 }}><Icon name="users" /></div>
            <div className="h3 text-muted">Recepção</div>
            <div className="text-muted mt-4" style={{ fontSize:"0.8rem"}}>Gestão da Fila</div>
          </button>
          
          <button className="card card--interactive flex-col items-center justify-center flex-1 p-5" onClick={() => setRole("mayor")}>
            <div style={{ color: "var(--brand-green)", marginBottom: 12 }}><Icon name="radio" /></div>
            <div className="h3 text-muted">Gabinete</div>
            <div className="text-muted mt-4" style={{ fontSize:"0.8rem"}}>Painel do Prefeito</div>
          </button>
        </div>
      </div>
    );

    // ─── MAIN DASHBOARD (RECEPCIONISTA & PREFEITO) ────────────────────────────
    const Dashboard = ({ role, queue, setQueue, isMayorFree, setMayorFree, logout }) => {
      const [showAdd, setShowAdd] = useState(false);
      const [toast, setToast] = useState(null);
      
      const waiting = queue.filter(q => q.status === "waiting");
      const inProg = queue.filter(q => q.status === "in-progress");
      const done = queue.filter(q => q.status === "done");

      // Notificação em tempo real (Simulação) para a Recepcionista
      const prevFree = useRef(isMayorFree);
      useEffect(() => {
        if (role === "receptionist" && !prevFree.current && isMayorFree) {
          setToast({ msg: "Sinal Verde! O Gabinete está livre para o próximo.", type: "success" });
        }
        prevFree.current = isMayorFree;
      }, [isMayorFree, role]);

      // Ações
      const addPerson = (person) => {
        setQueue([...queue, person]);
        setShowAdd(false);
        setToast({ msg: `${person.name} adicionado(a) à fila.`, type: "info" });
      };

      const callPerson = (id) => {
        if (!isMayorFree) {
          setToast({ msg: "Atenção: O Prefeito está ocupado no momento.", type: "warning" });
          return;
        }
        setQueue(q => q.map(x => x.id === id ? {...x, status: "in-progress", startedAt: Date.now()} : x));
        setMayorFree(false); // Ocupa o prefeito automaticamente
        setToast({ msg: "Cidadão encaminhado ao gabinete.", type: "success" });
      };

      const finishPerson = (id) => {
        setQueue(q => q.map(x => x.id === id ? {...x, status: "done"} : x));
        setMayorFree(true); // Libera o prefeito automaticamente
        setToast({ msg: "Atendimento encerrado com sucesso.", type: "info" });
      };

      return (
        <div className="app-container">
          {/* Header */}
          <header className="flex items-center justify-between p-4">
            <div>
              <h1 className="h3">AtendeMais | {role === "mayor" ? "Gabinete" : "Recepção"}</h1>
              <p className="text-muted" style={{ fontSize: "0.85rem", marginTop: 4 }}>
                {role === "mayor" ? "Visão de Atendimento" : "Visão de Controle da Fila"}
              </p>
            </div>
            
            <div className="flex items-center gap-4">
              <StatusOrb online={isMayorFree} />
              <button className="btn btn--ghost btn--sm" onClick={logout}><Icon name="logout"/> Sair</button>
            </div>
          </header>

          {/* Main Area */}
          <main>
            
            {/* Bloco Exclusivo Prefeito: Controle de Status Gigante */}
            {role === "mayor" && (
              <div className="card flex items-center justify-between mb-4" style={{ borderColor: isMayorFree ? "var(--brand-green)" : "var(--brand-red)" }}>
                <div>
                  <div className="h6 mb-4">Seu Status Atual</div>
                  <div className="text-mono" style={{ fontSize: "1.4rem", color: isMayorFree ? "var(--brand-green)" : "var(--brand-red)", fontWeight: 700 }}>
                    {isMayorFree ? "● DISPONÍVEL" : "● EM ATENDIMENTO"}
                  </div>
                  <div className="text-muted mt-4" style={{ fontSize: "0.8rem" }}>A recepção reage ao seu status.</div>
                </div>
                <button className={`btn ${isMayorFree ? "btn--danger" : "btn--success"} btn--lg`} onClick={() => {
                  setMayorFree(!isMayorFree);
                  setToast({ msg: !isMayorFree ? "Status: LIVRE. A recepção foi notificada." : "Status: OCUPADO.", type: !isMayorFree ? "success" : "warning" });
                }}>
                  Mudar para {isMayorFree ? "Ocupado" : "Livre"}
                </button>
              </div>
            )}

            {/* Seção: Em Atendimento */}
            {inProg.length > 0 && (
              <div className="mb-4" style={{ marginBottom: "32px" }}>
                <div className="h6 mb-4" style={{ color: "var(--brand-green)" }}>Em Atendimento Agora</div>
                {inProg.map(p => <CitizenCard key={p.id} person={p} isCurrent role={role} onFinish={finishPerson} />)}
              </div>
            )}

            {/* Seção: Fila de Espera */}
            <div className="flex items-center justify-between mb-4">
              <div className="h6" style={{ color: "var(--brand-blue)" }}>Fila de Espera ({waiting.length})</div>
              {role === "receptionist" && (
                <button className="btn btn--primary btn--sm" onClick={() => setShowAdd(true)}>
                  <Icon name="plus"/> Novo Cidadão
                </button>
              )}
            </div>
            
            {waiting.length === 0 ? (
              <div className="text-muted text-center p-5" style={{ border: "1px dashed var(--border-subtle)", borderRadius: "12px", marginBottom: "32px" }}>
                Nenhum cidadão aguardando no momento.
              </div>
            ) : (
              <div style={{ marginBottom: "32px" }}>
                {waiting.map((p) => <CitizenCard key={p.id} person={p} role={role} onCall={callPerson} onRemove={(id) => setQueue(q => q.filter(x => x.id !== id))} />)}
              </div>
            )}

            {/* Seção: Concluídos Hoje (Visível apenas para Recepcionista no rodapé) */}
            {role === "receptionist" && done.length > 0 && (
              <div>
                <div className="h6 mb-4">Concluídos Hoje ({done.length})</div>
                {done.map(p => <CitizenCard key={p.id} person={p} role="none" />)}
              </div>
            )}

          </main>

          {/* Renderização de Modais e Toasts */}
          {showAdd && <AddModal onClose={() => setShowAdd(false)} onAdd={addPerson} />}
          {toast && <Toast msg={toast.msg} type={toast.type} close={() => setToast(null)} />}
        </div>
      );
    };

    // ─── STATE MANAGER (APP) ──────────────────────────────────────────────────
    const App = () => {
      // Estado Global (Simulando o Banco de Dados)
      const [role, setRole] = useState(null); // 'receptionist' | 'mayor' | null
      const [isFree, setIsFree] = useState(false);
      const [queue, setQueue] = useState([
        { id: "1", name: "João Batista Ferreira", subject: "Infraestrutura", tags: ["Urgente"], status: "waiting", startedAt: null },
        { id: "2", name: "Ana Claudia Rocha", subject: "Educação", tags: ["Recorrente"], status: "waiting", startedAt: null }
      ]);

      if (!role) {
        return <LoginScreen setRole={setRole} />;
      }

      return <Dashboard role={role} queue={queue} setQueue={setQueue} isMayorFree={isFree} setMayorFree={setIsFree} logout={() => setRole(null)} />;
    };

    // ─── INITIALIZATION ───────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
